
<!DOCTYPE html>
<html>
    <head>
        <title>
            System Health Monitor System
        </title>
        <style>
            body{
                background-color: #72d06a;
                font-family: Arial, sans-serif;
                margin: 40px;
            }
            .metrics{
                background-color: #41a230;
                padding: 20px;
                border-radius: 10px;
                max-width: 600px;
                margin: 0 auto;
            }
            .cpu{
                background-color: #28a745;
                color: white;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
            }
            .memory{
                background-color: #ffc107;
                color: white;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
            }
            .windows{
                background-color: #ff9800;
                color: white;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
            }
            .wsl{
                background-color: #28a745;
                color: white;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
            }
            .timestamp{
                background-color: #6c757d;
                color: white;
                padding: 10px;
                margin: 10px 0;
                border-radius: 5px;
                text-align: center;
                font-size: 0.9em;
            }
            h1{
                color: white;
                text-align: center;
                margin-bottom: 20px;
            }
        </style>
    </head>
    <body>
        <div class="metrics">
            <h1>Hello eljay</h1>
            <div class="cpu">CPU Usage : 4.66 %</div>
            <div class="memory">Memory Usage : 30.07 %</div>
            <div class="windows">Windows drivers disk used : 75.0 %</div>
            <div class="wsl">WSL drivers disk used : 1.0 %</div>
            <div class="timestamp">Time/date : 2026-04-08 10:06:19</div>
        </div>
    </body>
</html>
